services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-legal_chunks}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DEVICE: cpu
      HF_HOME: /models/huggingface
    volumes:
      - ./.env:/app/.env:ro
      - model_cache:/models
    depends_on:
      ingest:
        condition: service_completed_successfully
    command: >
      sh -c "python scripts/wait_for_qdrant.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  ingest:
    build: .
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-legal_chunks}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DEVICE: cpu
      HF_HOME: /models/huggingface
    volumes:
      - model_cache:/models
    depends_on:
      - qdrant
    command: >
      sh -c "python scripts/wait_for_qdrant.py &&
             python -m ingestion.ingest_documents"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  model_cache:
  qdrant_storage:
